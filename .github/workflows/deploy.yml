name: Deploy no Kubernetes
on:
    workflow_call:
        inputs:
            environment-name:
                required: true
                type: string
            environment-url:
                required: true
                type: string

jobs:
    deploy:
        name: Deploy
        runs-on: ubuntu-latest
        environment:
            name: ${{ inputs.environment-name }}
            url: ${{ inputs.environment-url }}
        steps:
            - name: Obtendo o codigo do projeto
              uses: actions/checkout@v4

            - name: Configurando o contexto do Kubernetes
              uses: azure/k8s-set-context@v4
              with:
                method: kubeconfig
                kubeconfig: ${{ secrets.K8S_CONFIG }}
            - name: Update Deployment
              run: "sed -i 's/host: homologacao.alanfmaia.com.br/host ${{ vars.BASE_URL }}/g' k8s/deployment.yaml"
            - name: Deploy no Kubernetes
              uses: Azure/k8s-deploy@v5
              with:
                namespace: ${{ secrets.K8S_NAMESPACE }}
                manifests: |
                    k8s/deployment.yaml
                images: |
                    afmaia/devops-pro:${{ github.run_number }}
