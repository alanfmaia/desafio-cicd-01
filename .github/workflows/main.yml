name: Pipeline CI/CD
run-name: Pipeline CI/CD por ${{ github.actor }} em ${{ github.run_number }}

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name:  Build
    runs-on: ubuntu-latest
    steps:
      - name: Obtendo o codigo do projeto
        uses: actions/checkout@v4
      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.300"
      - name: Execução do comando build
        working-directory: ./src
        run: dotnet build  Review-Filmes.sln

  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Obtendo codigo do projeto
        uses: actions/checkout@v4
      - name: Efetuando login no docker hub
        uses: docker/login-action:v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Build e Push da imagem para o docker
        uses: docker/build-push-action@v6
        with:
          push: true
          context: ./src
          file: ./src/Review-Filmes.Web/Dockerfile
          tags: |
            alanfmaia/devops-pro:latest
            alanfmaia/devops-pro:${{ github.run_number }}