name: Pipeline CI/CD
run-name: Pipeline CI/CD por ${{ github.actor }} em ${{ github.run_number }}

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name:  Build
    runs-on: ubuntu-latest
    steps:
      - name: Obtendo o codigo do projeto
        uses: actions/checkout@v4
      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.300"
      - name: Execução do comando build
        working-directory: ./src
        run: dotnet build  Review-Filmes.sln

  testes:
    needs: [build]
    uses: alanfmaia/desafio-cicd-01/.github/workflows/teste.yml@main
    secrets: inherit

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [testes]
    steps:
      - name: Obtendo codigo do projeto
        uses: actions/checkout@v4
      
      - name: Analise do Dockefile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./src/Review-Filmes.Web/Dockerfile
      - name: Efetuando login no docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Build e Push da imagem para o docker
        uses: docker/build-push-action@v6
        with:
          push: true
          context: ./src
          file: ./src/Review-Filmes.Web/Dockerfile
          tags: |
            afmaia/devops-pro:latest
            afmaia/devops-pro:${{ github.run_number }}

      - name: Executar o Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: "image"
          image-ref: "afmaia/devops-pro:${{ github.run_number }}"
          format: "sarif"
          output: "trivy-docker-result.sarif"
          severity: "UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL"

      - name: Upload do resultado do Trivy
        uses: github/codeql-action/upload-sarif@v3
        with:
          category: docker-result
          sarif_file: trivy-docker-result.sarif

  deploy-homolog:
    needs: [release]
    uses: alanfmaia/desafio-cicd-01/.github/workflows/deploy.yml@main
    secrets: inherit
    with:
      environment-name: homologacao
      environment-url: http://homologacao.alanfmaia.com.br

  teste-end2end:
    name: Teste End2End
    runs-on: ubuntu-latest
    needs: [deploy-homolog]
    environment:
      name: homologacao

    container:
      image: afmaia/teste-dotnet:chrome
      env:
        BASE_URL: "http://${{ vars.BASE_URL }}"

    steps:
      - name: Obtendo codigo do projeto
        uses: actions/checkout@v4
      
      - name: Execução do codigo do teste end2end
        working-directory: ./src
        run: dotnet test ./Review-Filmes.Test.End2End/Review-Filmes.Test.End2End.csproj  
  deploy-producao:
    needs: [deploy-homolog]
    uses: alanfmaia/desafio-cicd-01/.github/workflows/deploy.yml@main
    secrets: inherit
    with:
      environment-name: producao
      environment-url: http://producao.alanfmaia.com.br